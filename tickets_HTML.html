<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Gestión de Tickets</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="contenedor-layout">

            <div class="logo">🚨 <span>IncidentApp</span></div>
            <nav>
                <a href="index.html">📊 Dashboard</a>
                <a href="reportar.html">➕ Reportar</a>

            </nav>

                        <p style="font-size: 0.85rem; color:#718096;">Reportado hace 1 hora por Finanzas</p>

                    <span style="background: #feebc8; color: #9c4221; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.8rem; font-weight: bold;">MEDIA</span>

                </div>
